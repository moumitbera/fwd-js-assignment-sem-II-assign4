<!--
Fare Calculator
A ride fare is computed as follows:
• start with fare = base + 7 * distance
• if minutesLate > 15, add 20
• if distance > 10, add ⌊10% of fare ⌋
• if seed is odd, subtract seed otherwise, add seed
• finally, round the result up to the nearest multiple of 5

Input Format: Take base, distance, minutesLate, and seed using prompt().
Output Format: Print the final fare using alert().
Constraints: 1 ≤ base ≤ 1000, 0 ≤ distance ≤ 100, 0 ≤ minutesLate ≤ 120, 0 ≤
seed ≤ 9
Sample Input:
base = 50, distance = 8, minutesLate = 20, seed = 3
Sample Output:
125

-->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solution 04</title>
</head>
<body>
    <script>
        let base = Number(prompt("Enter base: "));
        let distance = Number(prompt("Enter distance"));
        let minutesLate = Number(prompt("Enter minutes late: "));
        let seed = Number(prompt("Enter seed value"));

        let fare = base + 7 * distance;
        if(minutesLate>15){
            fare += 20;
        }
        if (distance > 10){
            fare += Math.floor(0.1*fare); //adding 10% of the fare, floored version
        }
        if(seed % 2 == 0){
            //case when seed is even
            fare += seed;
        } else {
            fare -= seed;
        }

       let check_ex = fare % 5;
       if (check_ex){
            fare += (5 - check_ex)
       }

       alert(fare);

    </script>
</body>
</html>
