<!--
Skipping Numbers
Given N and seed, find the smallest positive integer m such that the sum of all numbers
from 1 to m that are not divisible by (seed + 2) is at least N .
Print both:
• the value of m
• the computed sum
Input Format: Take N and seed using prompt().
Output Format: Show m and the sum clearly using alert().
Constraints: 1 ≤ N ≤ 106, 0 ≤ seed ≤ 9
Sample Input:
N = 100, seed = 3
Sample Output:
15 105

findings:
Wrong sample output given it'd be 106, 16
1+2+3+4+6+7+8+9+11+12+13+14 = 90
90+16 = 106 > 100 this would be printed
-->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solution 05</title>
</head>
<body>
    <script>

        let n = Number(prompt("Enter the value for N"));
        let seed = Number(prompt("Enter the value for seed"));
        let cs = seed+2;
        
        let sum = 0;
        for(let m = 1; true; m++){
            if (m%cs != 0){
                sum += m;
            }

            if (sum >= n){
                alert("M = "+ m + " Sum = " + sum);
                break;
            }
        }


    </script>
</body>
</html>
